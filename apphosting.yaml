# Settings for Backend (on Cloud Run).
# See https://firebase.google.com/docs/app-hosting/configure#cloud-run
runConfig:
  minInstances: 0
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 1024

# Environment variables and secrets.
# See https://firebase.google.com/docs/app-hosting/configure#user-defined-environment
env:
  # Increase Node.js heap size to prevent OOM during build
  - variable: NODE_OPTIONS
    value: "--max-old-space-size=4096"
    availability:
      - BUILD

  # ─── Firebase Admin SDK (server-side token verification) ───────────────
  # Non-sensitive — safe to store as plain values
  - variable: FIREBASE_PROJECT_ID
    value: "paperworking-97055"
    availability:
      - RUNTIME

  # Sensitive — stored in Google Secret Manager.
  # Create with: gcloud secrets create FIREBASE_CLIENT_EMAIL --data-file=-
  # then paste: firebase-adminsdk-XXXXX@paperworking-97055.iam.gserviceaccount.com
  - variable: FIREBASE_CLIENT_EMAIL
    secret: FIREBASE_CLIENT_EMAIL
    availability:
      - RUNTIME

  # Sensitive — stored in Google Secret Manager.
  # Create with: gcloud secrets create FIREBASE_PRIVATE_KEY --data-file=-
  # then paste the full PEM key (actual newlines are fine in Secret Manager)
  - variable: FIREBASE_PRIVATE_KEY
    secret: FIREBASE_PRIVATE_KEY
    availability:
      - RUNTIME
